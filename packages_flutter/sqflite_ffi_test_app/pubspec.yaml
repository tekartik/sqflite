name: sqflite_ffi_test_app
description: sqflite_ffi test application.
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ">=0.1.3"
  path:
  sqflite_ffi: ">=0.1.0"
  sqflite_example_common:
    git:
      url: https://github.com/tekartik/sqflite
      path: packages_flutter/sqflite_example_common

dev_dependencies:
  flutter_lints: ">=6.0.0"
  flutter_test:
    sdk: flutter

dependency_overrides:
  sqflite_common:
    path: ../../sqflite_common
  sqflite_common_ffi:
    path: ../../sqflite_common_ffi
  sqflite_ffi:
    path: ../sqflite_ffi
  sqflite_example_common:
    path: ../sqflite_example_common

flutter:
  uses-material-design: true
